[project]
name = "silmari-runtime"
version = "0.1.0"
description = "Silmari runtime — registry, scheduler, ruleset engine, sinks, review, API."
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
authors = [{ name = "Dou Inc." }]
dependencies = [
    "silmari-core",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "apscheduler>=3.10,<4",
    "pydantic>=2.6",
    "pyyaml>=6.0",
]

[project.scripts]
silmari = "silmari_runtime.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/silmari_runtime"]

[tool.uv.sources]
silmari-core = { workspace = true }
