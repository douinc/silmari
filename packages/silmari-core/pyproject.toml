[project]
name = "silmari-core"
version = "0.1.0"
description = "Governed, read-only, scoped, audited data access for LLM agents."
requires-python = ">=3.11"
authors = [{ name = "Dou Inc." }]
dependencies = [
    "sqlglot>=25.0",
    "sqlalchemy>=2.0",
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "httpx>=0.27",
    "duckdb>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/silmari_core"]
