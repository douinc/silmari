name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Sync
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: uv run mypy packages/silmari-core/src packages/silmari-runtime/src
      - name: Test
        run: uv run pytest -q
